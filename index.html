<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insertion Sort Visualizer</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }
    html, body { height: 100%; margin: 0; }

    @keyframes popIn {
      0% { transform: scale(0.3); opacity: 0; }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes slideDown {
      0% { transform: translateY(-80px) scale(0.8); opacity: 0; }
      50% { transform: translateY(-40px) scale(1.05); }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes shiftLeft {
      0% { transform: translateX(0); }
      50% { transform: translateY(-70px) scale(1.08); }
      100% { transform: translateX(var(--shift-dist)); }
    }
    @keyframes insertSnap {
      0% { transform: translateY(-100px) scale(0.7); opacity: 0; }
      40% { transform: translateY(-50px) scale(1.15); }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
      50% { box-shadow: 0 0 20px 8px rgba(251, 191, 36, 0.3); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-120px) rotate(720deg); opacity: 0; }
    }
    .bar-pop { animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .key-drop { animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .shift-left { animation: shiftLeft 0.65s ease-in-out forwards; }
    .insert-snap { animation: insertSnap 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .pulse-glow { animation: pulseGlow 1s infinite; }
    .slide-up { animation: slideUp 0.4s ease-out forwards; }
    .history-item { animation: slideUp 0.3s ease-out forwards; }

    .bar-box {
      transition: background 0.3s, border-color 0.3s;
      position: relative;
    }

    .tag {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 800;
      padding: 1px 6px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .confetti-particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confetti 1s ease-out forwards;
    }

    .step-btn {
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .step-btn:hover { transform: translateY(-2px); }
    .step-btn:active { transform: translateY(0); }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    input[type="number"] { -moz-appearance: textfield; }

    .scroll-area::-webkit-scrollbar { width: 6px; }
    .scroll-area::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="w-full h-full overflow-auto" style="background: linear-gradient(135deg, #1e1b4b 0%, #312e81 30%, #4c1d95 60%, #581c87 100%);">
   <!-- Header -->
   <header class="text-center pt-8 pb-4 px-4">
    <h1 id="pageTitle" class="text-3xl md:text-4xl font-900 bg-gradient-to-r from-amber-300 via-pink-300 to-purple-300 bg-clip-text text-transparent drop-shadow-lg">Insertion Sort Visualizer</h1>
    <p id="subtitleText" class="mt-2 text-purple-300/80 font-600 text-sm md:text-base">Pahami algoritma sorting step-by-step</p>
   </header>
   <main class="max-w-4xl mx-auto px-4 pb-12">
    <!-- Input Section -->
    <section class="bg-white/8 backdrop-blur rounded-2xl p-5 mb-6 border border-white/12"><label class="text-purple-200 font-700 text-sm mb-3 block"><i data-lucide="keyboard" class="inline w-4 h-4 mr-1 -mt-0.5"></i> Masukkan Angka</label>
     <div class="flex gap-2">
      <input id="numInput" type="number" placeholder="Ketik angka..." class="flex-1 bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white font-700 text-lg focus:outline-none focus:border-amber-400 focus:ring-2 focus:ring-amber-400/30 placeholder:text-purple-300/40"> <button id="addBtn" class="step-btn bg-gradient-to-r from-amber-400 to-orange-500 text-white font-800 px-5 rounded-xl flex items-center gap-1 shadow-lg shadow-amber-300/30"> <i data-lucide="plus" class="w-5 h-5"></i> Tambah </button>
     </div>
     <div class="flex gap-2 mt-3 flex-wrap">
      <button id="randomBtn" class="step-btn bg-white/10 border border-white/20 text-purple-200 font-600 text-xs px-3 py-1.5 rounded-lg hover:bg-white/20 flex items-center gap-1"><i data-lucide="shuffle" class="w-3 h-3"></i> Random 5</button> <button id="clearBtn" class="step-btn bg-white/10 border border-white/20 text-purple-200 font-600 text-xs px-3 py-1.5 rounded-lg hover:bg-white/20 flex items-center gap-1"><i data-lucide="trash-2" class="w-3 h-3"></i> Reset</button>
     </div>
     <div id="inputTags" class="flex flex-wrap gap-2 mt-3 min-h-[32px]"></div>
    </section><!-- Visualization Area -->
    <section id="vizSection" class="hidden">
     <!-- Controls -->
     <div class="flex flex-wrap justify-center gap-3 mb-5">
      <button id="startBtn" class="step-btn bg-gradient-to-r from-emerald-400 to-teal-500 text-white font-800 px-5 py-2.5 rounded-xl shadow-lg shadow-emerald-300/30 flex items-center gap-2"><i data-lucide="play" class="w-5 h-5"></i> Mulai Sorting</button> <button id="nextBtn" class="step-btn bg-gradient-to-r from-cyan-400 to-sky-500 text-white font-800 px-5 py-2.5 rounded-xl shadow-lg shadow-cyan-300/30 flex items-center gap-2 hidden"><i data-lucide="skip-forward" class="w-5 h-5"></i> Langkah Berikutnya</button> <button id="autoBtn" class="step-btn bg-gradient-to-r from-violet-400 to-purple-500 text-white font-800 px-5 py-2.5 rounded-xl shadow-lg shadow-violet-300/30 flex items-center gap-2 hidden"><i data-lucide="fast-forward" class="w-5 h-5"></i> Auto Play</button>
     </div><!-- Step Info -->
     <div id="stepInfo" class="bg-white/8 backdrop-blur rounded-2xl p-5 mb-5 border border-white/12 text-center hidden">
      <p id="stepText" class="text-purple-200 font-700 text-base md:text-lg leading-relaxed"></p>
     </div><!-- Bars -->
     <div class="bg-white/8 backdrop-blur rounded-2xl p-5 mb-5 border border-white/12">
      <p class="text-amber-300 font-700 text-xs mb-4 uppercase tracking-wider"><i data-lucide="bar-chart-3" class="inline w-3.5 h-3.5 mr-1 -mt-0.5"></i> Visualisasi Array</p>
      <div id="barsContainer" class="flex items-end justify-center gap-3 min-h-[240px] relative pt-6"></div>
      <div class="flex flex-wrap justify-center gap-4 mt-5 text-xs font-700">
       <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-gradient-to-b from-amber-300 to-amber-500 inline-block"></span><span class="text-purple-300/70">Key (Sedang Diproses)</span></span> <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-gradient-to-b from-rose-300 to-rose-500 inline-block"></span><span class="text-purple-300/70">Sedang Digeser</span></span> <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-gradient-to-b from-emerald-300 to-emerald-600 inline-block"></span><span class="text-purple-300/70">Sudah Terurut</span></span> <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-gradient-to-b from-purple-300 to-purple-500 inline-block"></span><span class="text-purple-300/70">Belum Diproses</span></span>
      </div>
     </div><!-- History -->
     <div class="bg-white/8 backdrop-blur rounded-2xl p-5 border border-white/12">
      <p class="text-pink-300 font-700 text-xs mb-3 uppercase tracking-wider"><i data-lucide="history" class="inline w-3.5 h-3.5 mr-1 -mt-0.5"></i> Riwayat Perubahan Array</p>
      <div id="historyList" class="scroll-area max-h-[300px] overflow-y-auto space-y-2"></div>
     </div>
    </section>
   </main>
  </div>
  <script>
  // ---- State ----
  let arr = [];
  let steps = [];
  let currentStep = -1;
  let autoInterval = null;
  let isSorting = false;

  const COLORS = {
    unsorted: 'from-purple-300 to-purple-500',
    key: 'from-amber-300 to-amber-500',
    shifting: 'from-rose-300 to-rose-500',
    sorted: 'from-emerald-300 to-emerald-600',
  };

  const BORDER_COLORS = {
    unsorted: 'border-purple-400/40',
    key: 'border-amber-400/60',
    shifting: 'border-rose-400/60',
    sorted: 'border-emerald-400/40',
  };

  // ---- Elements ----
  const $ = id => document.getElementById(id);
  const numInput = $('numInput');
  const addBtn = $('addBtn');
  const randomBtn = $('randomBtn');
  const clearBtn = $('clearBtn');
  const inputTags = $('inputTags');
  const vizSection = $('vizSection');
  const startBtn = $('startBtn');
  const nextBtn = $('nextBtn');
  const autoBtn = $('autoBtn');
  const stepInfo = $('stepInfo');
  const stepText = $('stepText');
  const barsContainer = $('barsContainer');
  const historyList = $('historyList');

  // ---- Generate Steps ----
  function generateSteps(input) {
    const a = [...input];
    const n = a.length;
    const allSteps = [];

    allSteps.push({
      type: 'init',
      array: [...a],
      msg: `Array awal: [${a.join(', ')}]. Insertion Sort akan membangun array terurut dengan menempatkan setiap elemen ke posisi yang tepat.`,
      sorted: [],
      highlight: [],
      keyIdx: -1,
    });

    for (let i = 1; i < n; i++) {
      const key = a[i];
      let j = i - 1;

      allSteps.push({
        type: 'key_select',
        array: [...a],
        msg: `🔑 Iterasi ${i}: Ambil key = ${key} dari indeks ${i}. Elemen [0...${i-1}] sudah terurut, sekarang tempatkan key di posisi yang benar.`,
        sorted: Array.from({length: i}, (_, k) => k),
        keyIdx: i,
      });

      let shifted = false;
      while (j >= 0 && a[j] > key) {
        allSteps.push({
          type: 'compare',
          array: [...a],
          msg: `👀 Bandingkan: a[${j}] = ${a[j]} > ${key} (key)? ✅ Ya! Perlu geser.`,
          sorted: Array.from({length: i}, (_, k) => k),
          keyIdx: i,
          compareIdx: j,
        });

        // Shift animation
        allSteps.push({
          type: 'shift',
          array: [...a],
          msg: `🔀 Geser ${a[j]} dari indeks ${j} ke indeks ${j + 1}.`,
          sorted: Array.from({length: i}, (_, k) => k),
          keyIdx: i,
          shiftIdx: j,
          shiftAmount: j + 1,
        });

        a[j + 1] = a[j];
        j--;
        shifted = true;
      }

      a[j + 1] = key;

      allSteps.push({
        type: 'insert',
        array: [...a],
        msg: `✨ Sisipkan key ${key} ke indeks ${j + 1}. <strong>Iterasi ${i} selesai!</strong>`,
        sorted: Array.from({length: i + 1}, (_, k) => k),
        keyIdx: j + 1,
        insertIdx: j + 1,
      });
    }

    allSteps.push({
      type: 'done',
      array: [...a],
      msg: `🎉 Selesai! Array terurut: [${a.join(', ')}]`,
      sorted: Array.from({length: n}, (_, k) => k),
      highlight: [],
      keyIdx: -1,
    });

    return allSteps;
  }

  // ---- Render Bars ----
  function renderBars(step) {
    const a = step.array;
    const maxVal = Math.max(...a, 1);
    barsContainer.innerHTML = '';
    const barWidth = 60;

    a.forEach((val, idx) => {
      const isSorted = step.sorted && step.sorted.includes(idx);
      const isKey = step.keyIdx === idx;
      const isShifting = step.shiftIdx === idx;
      const isCompare = step.compareIdx === idx;
      const isInsert = step.insertIdx === idx;

      let colorClass = COLORS.unsorted;
      let borderClass = BORDER_COLORS.unsorted;
      let tagHTML = '';
      let animClass = '';

      if (isSorted && !isKey) {
        colorClass = COLORS.sorted;
        borderClass = BORDER_COLORS.sorted;
      }
      if (isKey && !isSorted) {
        colorClass = COLORS.key;
        borderClass = BORDER_COLORS.key;
        tagHTML = `<span class="tag bg-amber-500 text-white font-800">KEY</span>`;
        animClass = 'key-drop';
      }
      if (isShifting) {
        colorClass = COLORS.shifting;
        borderClass = BORDER_COLORS.shifting;
        tagHTML = `<span class="tag bg-rose-500 text-white font-800">SHIFT</span>`;
        animClass = 'shift-left';
      }
      if (isCompare) {
        tagHTML = `<span class="tag bg-cyan-400 text-white font-800">CEK</span>`;
      }
      if (isInsert) {
        animClass = 'insert-snap';
        tagHTML = `<span class="tag bg-emerald-500 text-white font-800">INSERT</span>`;
      }

      const heightPct = Math.max(20, (val / maxVal) * 160);

      const wrapper = document.createElement('div');
      wrapper.className = 'flex flex-col items-center';
      wrapper.style.width = barWidth + 'px';

      const bar = document.createElement('div');
      bar.className = `bar-box bg-gradient-to-b ${colorClass} border-2 ${borderClass} rounded-lg flex items-center justify-center ${animClass}`;
      bar.style.cssText = `width:${barWidth}px;height:${heightPct}px;animation-delay:${idx * 40}ms;`;
      if (isKey && !isSorted) bar.classList.add('pulse-glow');

      bar.innerHTML = `${tagHTML}<span class="text-white font-800 text-sm drop-shadow">${val}</span>`;

      if (isShifting && step.shiftAmount !== undefined) {
        const dist = (step.shiftAmount - idx) * (barWidth + 12);
        bar.style.setProperty('--shift-dist', dist + 'px');
      }

      const label = document.createElement('span');
      label.className = 'text-purple-300/60 text-xs font-700 mt-1';
      label.textContent = `[${idx}]`;

      wrapper.appendChild(bar);
      wrapper.appendChild(label);
      barsContainer.appendChild(wrapper);
    });
  }

  // ---- Render History ----
  function addHistory(step, stepNum) {
    const div = document.createElement('div');
    div.className = 'history-item bg-white/8 rounded-xl px-4 py-3 border border-white/12';

    let typeLabel = '';
    let typeColor = '';
    switch(step.type) {
      case 'init': typeLabel = 'AWAL'; typeColor = 'bg-purple-500'; break;
      case 'key_select': typeLabel = 'KEY'; typeColor = 'bg-amber-500'; break;
      case 'compare': typeLabel = 'BANDINGKAN'; typeColor = 'bg-cyan-500'; break;
      case 'shift': typeLabel = 'GESER'; typeColor = 'bg-rose-500'; break;
      case 'insert': typeLabel = 'SISIPKAN'; typeColor = 'bg-emerald-500'; break;
      case 'done': typeLabel = 'SELESAI'; typeColor = 'bg-green-500'; break;
      default: typeLabel = 'STEP'; typeColor = 'bg-purple-400';
    }

    div.innerHTML = `
      <div class="flex items-center gap-2 mb-1.5">
        <span class="text-[10px] font-800 ${typeColor} text-white px-2 py-0.5 rounded-md">${typeLabel}</span>
        <span class="text-purple-300/50 text-[10px] font-700">Step ${stepNum}</span>
      </div>
      <p class="text-purple-200 text-xs font-600 leading-relaxed">${step.msg}</p>
      <div class="flex gap-1 mt-2 flex-wrap">
        ${step.array.map((v, i) => {
          const s = step.sorted && step.sorted.includes(i);
          return `<span class="text-[11px] font-800 px-1.5 py-0.5 rounded ${s ? 'bg-emerald-500/20 text-emerald-300' : 'bg-purple-500/10 text-purple-300'}">${v}</span>`;
        }).join('')}
      </div>
    `;
    historyList.prepend(div);
  }

  // ---- Confetti ----
  function spawnConfetti() {
    const colors = ['#fbbf24','#fb923c','#f472b6','#ec4899','#a78bfa','#c084fc'];
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-particle';
      p.style.cssText = `left:${Math.random()*100}%;top:${60+Math.random()*30}%;background:${colors[i%colors.length]};animation-delay:${Math.random()*0.5}s;`;
      barsContainer.appendChild(p);
      setTimeout(() => p.remove(), 1500);
    }
  }

  // ---- Render Tags ----
  function renderTags() {
    inputTags.innerHTML = arr.length === 0
      ? '<span class="text-purple-300/40 text-xs font-600 italic">Belum ada angka...</span>'
      : arr.map((v, i) => `<span class="bg-gradient-to-r from-purple-400/20 to-pink-400/20 border border-purple-400/40 text-purple-200 text-xs font-800 px-2.5 py-1 rounded-lg flex items-center gap-1">${v}<button onclick="removeNum(${i})" class="hover:text-rose-400 transition-colors ml-0.5">&times;</button></span>`).join('');
    vizSection.classList.toggle('hidden', arr.length < 2);
  }

  window.removeNum = function(i) {
    if (isSorting) return;
    arr.splice(i, 1);
    renderTags();
    resetSort();
  };

  function resetSort() {
    steps = [];
    currentStep = -1;
    if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
    isSorting = false;
    startBtn.classList.remove('hidden');
    nextBtn.classList.add('hidden');
    autoBtn.classList.add('hidden');
    autoBtn.innerHTML = '<i data-lucide="fast-forward" class="w-5 h-5"></i> Auto Play';
    stepInfo.classList.add('hidden');
    barsContainer.innerHTML = '';
    historyList.innerHTML = '';
    lucide.createIcons();
  }

  // ---- Add Number ----
  function addNumber() {
    const val = parseInt(numInput.value);
    if (isNaN(val)) return;
    if (arr.length >= 15) return;
    arr.push(val);
    numInput.value = '';
    numInput.focus();
    renderTags();
    resetSort();
  }

  addBtn.addEventListener('click', addNumber);
  numInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addNumber(); } });

  randomBtn.addEventListener('click', () => {
    if (isSorting) return;
    arr = Array.from({length: 5}, () => Math.floor(Math.random() * 99) + 1);
    renderTags();
    resetSort();
  });

  clearBtn.addEventListener('click', () => {
    arr = [];
    renderTags();
    resetSort();
  });

  // ---- Start ----
  startBtn.addEventListener('click', () => {
    if (arr.length < 2) return;
    steps = generateSteps(arr);
    currentStep = -1;
    isSorting = true;
    historyList.innerHTML = '';
    startBtn.classList.add('hidden');
    nextBtn.classList.remove('hidden');
    autoBtn.classList.remove('hidden');
    stepInfo.classList.remove('hidden');
    lucide.createIcons();
    advanceStep();
  });

  // ---- Next Step ----
  function advanceStep() {
    if (currentStep >= steps.length - 1) {
      finishSort();
      return;
    }
    currentStep++;
    const step = steps[currentStep];
    stepText.innerHTML = step.msg;
    stepInfo.classList.remove('hidden');
    renderBars(step);
    addHistory(step, currentStep + 1);

    if (step.type === 'done') finishSort();
  }

  function finishSort() {
    isSorting = false;
    nextBtn.classList.add('hidden');
    autoBtn.classList.add('hidden');
    if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
    spawnConfetti();
    lucide.createIcons();
  }

  nextBtn.addEventListener('click', advanceStep);

  // ---- Auto Play ----
  autoBtn.addEventListener('click', () => {
    if (autoInterval) {
      clearInterval(autoInterval);
      autoInterval = null;
      autoBtn.innerHTML = '<i data-lucide="fast-forward" class="w-5 h-5"></i> Auto Play';
      lucide.createIcons();
      return;
    }
    autoBtn.innerHTML = '<i data-lucide="pause" class="w-5 h-5"></i> Pause';
    lucide.createIcons();
    autoInterval = setInterval(() => {
      if (currentStep >= steps.length - 1) {
        clearInterval(autoInterval);
        autoInterval = null;
        finishSort();
        return;
      }
      advanceStep();
    }, 1200);
  });

  // ---- Init ----
  renderTags();

  // ---- Element SDK ----
  const defaultConfig = {
    page_title: 'Insertion Sort Visualizer',
    subtitle_text: 'Pahami algoritma sorting step-by-step',
    background_color: '#1e1b4b',
    surface_color: '#ffffff14',
    text_color: '#e9d5ff',
    primary_action_color: '#fbbf24',
    secondary_action_color: '#34d399',
    font_family: 'Nunito',
    font_size: 20,
  };

  function applyConfig(config) {
    const t = config.page_title || defaultConfig.page_title;
    const s = config.subtitle_text || defaultConfig.subtitle_text;
    const font = config.font_family || defaultConfig.font_family;
    const size = config.font_size || defaultConfig.font_size;
    const bg = config.background_color || defaultConfig.background_color;
    const text = config.text_color || defaultConfig.text_color;
    const primary = config.primary_action_color || defaultConfig.primary_action_color;
    const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;

    $('pageTitle').textContent = t;
    $('subtitleText').textContent = s;

    document.body.style.fontFamily = `${font}, Nunito, sans-serif`;
    $('pageTitle').style.fontSize = `${size * 2}px`;
    $('subtitleText').style.fontSize = `${size * 0.9}px`;

    const app = $('app');
    app.style.background = `linear-gradient(135deg, ${bg} 0%, #312e81 30%, #4c1d95 60%, #581c87 100%)`;
    app.style.color = text;

    addBtn.style.background = `linear-gradient(to right, ${primary}, ${adjustColor(primary, -20)})`;
    startBtn.style.background = `linear-gradient(to right, #34d399, #14b8a6)`;
    nextBtn.style.background = `linear-gradient(to right, #06b6d4, #0891b2)`;
  }

  function adjustColor(hex, amt) {
    hex = hex.replace('#', '');
    if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
    let r = parseInt(hex.substring(0, 2), 16) + amt;
    let g = parseInt(hex.substring(2, 4), 16) + amt;
    let b = parseInt(hex.substring(4, 6), 16) + amt;
    r = Math.max(0, Math.min(255, r));
    g = Math.max(0, Math.min(255, g));
